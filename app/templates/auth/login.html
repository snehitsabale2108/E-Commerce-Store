{% extends "base.html" %}
{% block title %}Login - {{ app_name }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none">
              <i class="bi bi-basket3-fill text-primary" style="font-size: 3rem;"></i>
              <h4 class="text-primary fw-bold mt-1">{{ app_name }}</h4>
            </a>
            <p class="text-muted">Welcome back! Please sign in.</p>
          </div>
          <form method="post" action="{{ url_for('auth.login') }}" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
              </div>
            </div>
            <div class="mb-3">
              <div class="d-flex justify-content-between">
                <label class="form-label fw-semibold">Password</label>
                <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small">Forgot password?</a>
              </div>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Your password" id="passwordInput" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('passwordInput', this)"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="mb-4 d-flex align-items-center">
              <input type="checkbox" name="remember" class="form-check-input me-2">
              <label class="form-check-label small">Keep me signed in</label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>
          <div class="text-center mt-4">
            <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-primary fw-semibold">Sign Up</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.innerHTML = input.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
}
</script>
{% endblock %}
