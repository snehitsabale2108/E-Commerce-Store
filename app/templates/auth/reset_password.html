{% extends "base.html" %}
{% block title %}Reset Password - {{ app_name }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-2">Reset Password</h4>
            <p class="text-muted">Enter the OTP sent to your email.</p>
          </div>
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">OTP</label>
              <input type="text" name="otp" class="form-control text-center letter-spacing-lg" placeholder="6-digit OTP" maxlength="6" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <input type="password" name="password" class="form-control" placeholder="At least 8 characters" required minlength="8">
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
