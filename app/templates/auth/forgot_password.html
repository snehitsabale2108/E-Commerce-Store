{% extends "base.html" %}
{% block title %}Forgot Password - {{ app_name }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-lock-fill text-primary" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-2">Forgot Password?</h4>
            <p class="text-muted">Enter your email and we'll send you an OTP.</p>
          </div>
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send OTP</button>
          </form>
          <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">← Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
