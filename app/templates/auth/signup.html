{% extends "base.html" %}
{% block title %}Create Account - {{ app_name }}{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none">
              <i class="bi bi-basket3-fill text-primary" style="font-size: 3rem;"></i>
              <h4 class="text-primary fw-bold mt-1">{{ app_name }}</h4>
            </a>
            <p class="text-muted">Create your free account</p>
          </div>
          <form method="post" action="{{ url_for('auth.signup') }}" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required autofocus>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Phone Number (optional)</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                <input type="tel" name="phone" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Diet Preference</label>
              <select name="diet_preference" class="form-select">
                <option value="veg">🌿 Vegetarian</option>
                <option value="non_veg">🍗 Non-Vegetarian</option>
                <option value="vegan">🥦 Vegan</option>
                <option value="jain">🙏 Jain</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="At least 8 characters" id="pw1" required minlength="8">
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('pw1', this)"><i class="bi bi-eye"></i></button>
              </div>
              <div class="password-strength mt-1" id="strengthBar"></div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" id="pw2" required>
              </div>
              <div id="pwMatch" class="small mt-1"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
          </form>
          <div class="text-center mt-4">
            <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Sign In</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.innerHTML = input.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
}
document.getElementById('pw2').addEventListener('input', function() {
  const msg = document.getElementById('pwMatch');
  if (this.value === document.getElementById('pw1').value) {
    msg.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>Passwords match</span>';
  } else {
    msg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>Passwords do not match</span>';
  }
});
document.getElementById('pw1').addEventListener('input', function() {
  const bar = document.getElementById('strengthBar');
  const len = this.value.length;
  let strength = 'Weak', color = 'danger', width = '33%';
  if (len >= 12) { strength = 'Strong'; color = 'success'; width = '100%'; }
  else if (len >= 8) { strength = 'Medium'; color = 'warning'; width = '66%'; }
  bar.innerHTML = `<div class="progress" style="height: 4px;"><div class="progress-bar bg-${color}" style="width: ${width}"></div></div><small class="text-${color}">${strength}</small>`;
});
</script>
{% endblock %}
